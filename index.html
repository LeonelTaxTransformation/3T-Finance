<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel Financeiro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page-bg"></div>
  <main class="app">
    <header class="hero">
      <div class="brand-wrap">
        <img class="brand-logo" src="icone3T.png" alt="Grupo 3T" />
        <div>
          <h1>Painel Financeiro</h1>
          <p>Comparativo de saldo final por empresa</p>
        </div>
      </div>
      <img class="brands-strip" src="marcaspaquim.png" alt="Marcas do grupo" />
    </header>

    <section id="companyFilters" class="filters"></section>

    <section class="kpis">
      <article class="kpi-card">
        <div class="kpi-label"><span class="kpi-icon cyan"></span>Total Saldo Final</div>
        <div id="saldoFinal" class="kpi-value"></div>
        <div id="saldoFinalMeta" class="kpi-meta"></div>
      </article>
      <article class="kpi-card">
        <div class="kpi-label"><span class="kpi-icon red"></span>Variação do Período</div>
        <div id="variacao" class="kpi-value danger"></div>
      </article>
      <article class="kpi-card">
        <div class="kpi-label"><span class="kpi-icon gray"></span>Total Saldo Inicial</div>
        <div id="saldoInicial" class="kpi-value"></div>
      </article>
    </section>

    <section class="panel chart-panel">
      <h2>Evolução do Saldo Final</h2>
      <div class="chart-wrap"><canvas id="chart"></canvas></div>
    </section>

    <section class="panel details-panel">
      <h2>Detalhes por Período</h2>
      <div id="detailsList" class="details-list"></div>
    </section>
  </main>

  <div id="detailsModal" class="modal hidden" aria-hidden="true">
    <div class="modal-backdrop"></div>
    <div class="modal-card">
      <div class="modal-header">
        <div>
          <h3 id="modalTitle">Detalhes</h3>
          <p id="modalSubtitle"></p>
        </div>
        <button id="closeModal" class="close-btn" type="button">✕</button>
      </div>
      <div id="modalBody" class="modal-body"></div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
