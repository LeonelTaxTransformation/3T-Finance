<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3T Finance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page-shell">
    <header class="page-header">
      <div class="header-brand">
        <img src="icone3T.png" alt="Grupo 3T" class="brand-logo" />
        <div class="brand-copy">
          <h1>Painel Financeiro</h1>
          <p>Comparativo de saldo final por empresa</p>
        </div>
      </div>
    </header>

    <section class="filter-bar" id="companyFilters"></section>

    <section class="summary-grid">
      <article class="summary-card">
        <div class="summary-head">
          <span class="summary-icon summary-icon-cyan"></span>
          <span class="summary-label">Total Saldo Final</span>
        </div>
        <div class="summary-value" id="saldoFinalValue"></div>
        <div class="summary-sub" id="saldoFinalSub"></div>
      </article>

      <article class="summary-card">
        <div class="summary-head">
          <span class="summary-arrow">↘</span>
          <span class="summary-label">Variação do Período</span>
        </div>
        <div class="summary-value summary-negative" id="variacaoValue"></div>
      </article>

      <article class="summary-card">
        <div class="summary-head">
          <span class="summary-icon summary-icon-gray"></span>
          <span class="summary-label">Total Saldo Inicial</span>
        </div>
        <div class="summary-value" id="saldoInicialValue"></div>
      </article>
    </section>

    <section class="panel-card chart-panel">
      <h2>Evolução do Saldo Final</h2>
      <div class="chart-wrap">
        <canvas id="lineChart"></canvas>
      </div>
      <div class="legend-row" id="customLegend"></div>
    </section>

    <section class="panel-card details-panel">
      <h2>Detalhes por Período</h2>
      <div class="company-summary-list" id="detailsList"></div>
    </section>

    <footer class="page-footer">
      <img src="marcaspaquim.png" alt="Marcas do grupo" class="footer-brands" />
    </footer>
  </main>

  <div class="modal hidden" id="detailModal">
    <div class="modal-backdrop" id="modalBackdrop"></div>
    <div class="modal-dialog modal-dialog-wide">
      <button class="modal-close" id="modalClose" aria-label="Fechar">×</button>
      <h3 id="modalTitle"></h3>
      <div class="year-chip-row" id="yearChipRow"></div>
      <div class="year-detail-grid" id="yearDetailGrid"></div>
      <div class="address-box" id="addressBox"></div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
