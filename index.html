
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Financeiro</title>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 class="title">Painel Financeiro</h1>
        <div class="cards">
            <div class="card" id="saldoFinalCard">
                <h2 id="saldoFinalValue">R$ 0,00</h2>
                <p>Total Saldo Final</p>
            </div>
            <div class="card" id="variacaoCard">
                <h2 id="variacaoValue">R$ 0,00</h2>
                <p>Variação do Período</p>
            </div>
            <div class="card" id="saldoInicialCard">
                <h2 id="saldoInicialValue">R$ 0,00</h2>
                <p>Total Saldo Inicial</p>
            </div>
        </div>
        <div class="chart-section">
            <h2>Evolução do Saldo Final</h2>
            <canvas id="lineChart"></canvas>
        </div>
        <div class="table-section">
            <h2>Detalhes por Período</h2>
            <table id="detailsTable" class="display" style="width:100%">
                <thead>
                    <tr>
                        <th>Empresa</th>
                        <th>Período</th>
                        <th>Saldo Final</th>
                        <th>Variação</th>
                        <th>Variação %</th>
                    </tr>
                </thead>
                <tbody>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
